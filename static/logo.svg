<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 绿色圆角方形背景：模拟 3D 凸起 -->
    <linearGradient id="bg" x1="30%" y1="30%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#5dd85a"/>
      <stop offset="50%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#2e8b38"/>
    </linearGradient>

    <!-- 白色气泡：模拟 3D 球体感 -->
    <radialGradient id="bubble" cx="35%" cy="30%" r="75%" fx="30%" fy="25%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#f2f4f2"/>
      <stop offset="100%" stop-color="#d0d8d0"/>
    </radialGradient>

    <!-- 气泡内部阴影（增加立体感） -->
    <linearGradient id="bubbleShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="80%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.12)"/>
    </linearGradient>

    <!-- 三个绿色圆点 -->
    <radialGradient id="dot" cx="30%" cy="30%" r="70%" fx="25%" fy="25%">
      <stop offset="0%" stop-color="#7aea77"/>
      <stop offset="60%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#2e8b38"/>
    </radialGradient>

    <!-- 底部投影 -->
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.22)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <!-- 底部投影 -->
  <ellipse cx="100" cy="190" rx="78" ry="12" fill="url(#shadow)"/>

  <!-- 绿色圆角方形背景 -->
  <rect x="10" y="10" width="180" height="180" rx="48" ry="48" fill="url(#bg)"/>
  <rect x="10" y="10" width="180" height="180" rx="48" ry="48" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="2"/>

  <!-- 白色对话气泡 -->
  <path d="M155 45
           C165 45 170 52 170 65
           L170 110
           C170 123 162 130 148 130
           L75 130
           L45 150
           C42 152 40 150 41 147
           L50 128
           C40 124 35 117 35 105
           L35 65
           C35 52 42 45 55 45
           Z" fill="url(#bubble)"/>
  <path d="M155 45
           C165 45 170 52 170 65
           L170 110
           C170 123 162 130 148 130
           L75 130
           L45 150
           C42 152 40 150 41 147
           L50 128
           C40 124 35 117 35 105
           L35 65
           C35 52 42 45 55 45
           Z" fill="url(#bubbleShadow)"/>

  <!-- 三个绿色圆点 -->
  <circle cx="75" cy="80" r="10" fill="url(#dot)"/>
  <circle cx="105" cy="80" r="10" fill="url(#dot)"/>
  <circle cx="135" cy="80" r="10" fill="url(#dot)"/>
</svg>
