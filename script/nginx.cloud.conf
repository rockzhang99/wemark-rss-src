# 云端 RSS 服务端反向代理模板（改动036 阶段4 · HTTPS + 限流）
# 用法：放到 /etc/nginx/conf.d/ 或 sites-enabled/，改 server_name 与 ssl 路径后
#       nginx -t && systemctl reload nginx
# 作用：SSL 终止 + 请求限流 + 反代到本地 pm2 管理的 wemark-cloud(8001)
# 注意：代码层不处理 HTTPS，统一由本反向代理终止，后端只跑 http://127.0.0.1:8001

# 限流区：按客户端 IP 限流，防止单 IP 打爆
limit_req_zone $binary_remote_addr zone=rss_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

upstream wemark_cloud {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 80;
    server_name rss.your-domain.com;
    # 允许 ACME 挑战（certbot 申请证书用）
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    # 其余 80 端口请求全部跳转 HTTPS
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name rss.your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/rss.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rss.your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    client_max_body_size 10m;

    # 管理/上传 API：更严格限流
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://wemark_cloud;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # RSS 读取端点：限流（阅读器会周期性轮询）
    location /rss/ {
        limit_req zone=rss_limit burst=20 nodelay;
        proxy_pass http://wemark_cloud;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    location /feed/ {
        limit_req zone=rss_limit burst=20 nodelay;
        proxy_pass http://wemark_cloud;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源（logo 等）
    location /static/ {
        proxy_pass http://wemark_cloud;
        expires 1d;
    }
}
